services:
  ai-orchestrator-python:
    build:
      context: ..
      dockerfile: ai-orchestrator-python/Dockerfile
    image: agent-roundtable-studio-ai-orchestrator:latest
    container_name: agent-roundtable-studio-ai-orchestrator
    restart: unless-stopped
    env_file:
      - /opt/agent-roundtable-studio/env/backend.env
    environment:
      APP_ENV: production
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: 8790
      DATA_DIR: /data
    volumes:
      - /opt/agent-roundtable-studio/data:/data
    networks:
      - gateway-net
    expose:
      - "8790"

  agent-roundtable-studio:
    build:
      context: ..
      dockerfile: backend-java/Dockerfile
    image: agent-roundtable-studio-java-gateway:latest
    container_name: agent-roundtable-studio
    restart: unless-stopped
    depends_on:
      - ai-orchestrator-python
    environment:
      APP_ENV: production
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8787
      APP_BASE_PATH: /agent-roundtable-studio
      STATIC_ROOT: /app/frontend/dist
      AI_ORCHESTRATOR_URL: http://ai-orchestrator-python:8790
      AI_ORCHESTRATOR_TIMEOUT_MS: ${AI_ORCHESTRATOR_TIMEOUT_MS:-180000}
    networks:
      - gateway-net
    expose:
      - "8787"

networks:
  gateway-net:
    external: true
    name: ${DOCKER_NETWORK:-1panel-network}
